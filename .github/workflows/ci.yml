name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: E2E Smoke
        env:
          WEBSQLITE_PYTHON: python
        run: npm run test:e2e:smoke

      - name: Upload JUnit report (smoke)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-smoke
          if-no-files-found: ignore
          retention-days: 30
          path: test-results/junit.xml

      - name: Upload Playwright artifacts (smoke)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-smoke
          if-no-files-found: ignore
          retention-days: 7
          path: |
            playwright-report/
            test-results/

  regression:
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E Regression
        env:
          WEBSQLITE_PYTHON: python
        run: npm run test:e2e:regression

      - name: Upload JUnit report (regression)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-regression
          if-no-files-found: ignore
          retention-days: 30
          path: test-results/junit.xml

      - name: Upload Playwright artifacts (regression)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-regression
          if-no-files-found: ignore
          retention-days: 7
          path: |
            playwright-report/
            test-results/
