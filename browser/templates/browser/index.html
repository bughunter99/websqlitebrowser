<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>websqlitebrowser</title>
    <style>
        :root {
            --bg: #d9e1ec;
            --surface: #eef2f7;
            --surface-strong: #ffffff;
            --surface-muted: #f5f8fc;
            --line: #a6b3c5;
            --line-strong: #74839a;
            --text: #1a2433;
            --muted: #56657b;
            --accent: #2b579a;
            --accent-soft: #d5e4fb;
            --accent-ink: #1a3f7a;
            --warning: #8b2e1f;
            --shadow: 0 8px 18px rgba(22, 34, 50, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            min-height: 100%;
            font-family: "Tahoma", "Noto Sans KR", "Segoe UI", sans-serif;
            font-size: 12px;
            color: var(--text);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.32), rgba(255,255,255,0.06)),
                radial-gradient(circle at top left, rgba(43, 87, 154, 0.12), transparent 28%),
                var(--bg);
        }

        .app-shell {
            display: grid;
            grid-template-columns: 304px 1fr;
            height: 100dvh;
            gap: 8px;
            padding: 8px;
            overflow: hidden;
        }

        .sidebar,
        .main-panel {
            background: var(--surface);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            min-height: 0;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .activity-rail {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 4px;
            padding: 6px;
            border-top: 1px solid var(--line);
            background: linear-gradient(180deg, #e8edf4, #d7dfeb);
            flex: 0 0 auto;
        }

        .rail-button {
            height: 32px;
            border: 1px solid var(--line-strong);
            border-radius: 4px;
            background: linear-gradient(180deg, #ffffff, #dce4f0);
            color: var(--text);
            cursor: pointer;
            display: grid;
            place-items: center;
            padding: 3px 6px;
            text-align: center;
            font: inherit;
        }

        .rail-button .rail-label {
            display: block;
            font-size: 0.66rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .rail-button.active {
            background: linear-gradient(180deg, #cddffa, #9bbde9);
            border-color: var(--accent);
            color: var(--accent-ink);
        }

        .sidebar-body {
            display: grid;
            grid-template-rows: minmax(0, 1fr) auto;
            min-width: 0;
            min-height: 0;
            height: 100%;
        }

        .panel-stack {
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 6px;
        }

        .panel {
            display: none;
            height: 100%;
        }

        @keyframes sidebarPanelFade {
            from {
                opacity: 0;
                transform: translateY(2px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel-chat {
            flex-direction: column;
            gap: 6px;
            min-height: 0;
        }

        .panel-explorer {
            grid-template-rows: auto auto auto minmax(0, 1fr) auto;
            gap: 2px;
            min-height: 0;
        }
        
        .chat-panel {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: 6px;
            min-height: 0;
            flex: 1;
        }
        
        .chat-log {
            min-height: 0;
            overflow: auto;
            display: grid;
            gap: 6px;
            align-content: start;
        }
        
        .chat-composer {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 28px;
            gap: 4px;
            align-items: end;
        }
        
        .chat-composer textarea {
            min-height: 58px;
            max-height: 120px;
            resize: vertical;
        }
        
        .chat-send-mini {
            width: 28px;
            height: 28px;
            padding: 0;
            border-radius: 3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            line-height: 1;
        }

        .panel.active {
            display: block;
            animation: sidebarPanelFade 120ms ease-out;
        }

        .panel.panel-chat.active {
            display: flex;
        }

        .panel.panel-explorer.active {
            display: grid;
        }

        .panel-title {
            margin: 0;
            font-size: 0.66rem;
            font-weight: 700;
            color: var(--accent-ink);
            line-height: 1.1;
        }

        .path-chip {
            display: flex;
            align-items: center;
            min-height: 16px;
            padding: 0 5px;
            border: 1px solid var(--line);
            border-radius: 4px;
            background: var(--surface-strong);
            color: var(--accent-ink);
            font-size: 0.62rem;
            margin-bottom: 0;
            line-height: 1.1;
        }

        .explorer-list {
            display: grid;
            gap: 0;
            min-height: 0;
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 3px;
            background: var(--surface-strong);
        }

        .explorer-head,
        .explorer-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 90px 130px;
            align-items: center;
            gap: 6px;
            padding: 0 4px;
        }

        .explorer-head {
            position: sticky;
            top: 0;
            z-index: 1;
            background: linear-gradient(180deg, #f6f9fd, #e2e9f3);
            border-bottom: 1px solid var(--line);
            color: var(--accent-ink);
            font-weight: 700;
            font-size: 0.58rem;
            min-height: 14px;
            line-height: 1;
        }

        .explorer-row {
            border-bottom: 1px solid #d6deea;
            cursor: default;
            min-height: 14px;
            line-height: 1;
        }

        .explorer-row.parent-row {
            background: #f2f6fc;
            font-weight: 700;
        }

        .explorer-row:hover {
            background: #ecf3ff;
        }

        .explorer-row.selected {
            background: var(--accent-soft);
        }

        .explorer-name-col {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            overflow: hidden;
        }

        .explorer-kind {
            color: var(--muted);
            font-size: 0.56rem;
            flex: 0 0 auto;
        }

        .explorer-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.6rem;
            min-width: 0;
        }

        .explorer-size,
        .explorer-modified {
            font-size: 0.58rem;
            color: var(--muted);
            text-align: right;
            white-space: nowrap;
        }

        .explorer-row.parent-row .explorer-size,
        .explorer-row.parent-row .explorer-modified {
            color: #7b8ba1;
        }

        .explorer-statusbar {
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 14px;
            padding: 0 4px;
            border: 1px solid var(--line);
            border-radius: 3px;
            background: linear-gradient(180deg, #edf3fb, #dbe4f2);
            color: var(--accent-ink);
            font-size: 0.56rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        button,
        .nav-button {
            border: 1px solid var(--line-strong);
            background: linear-gradient(180deg, #ffffff, #dbe3ef);
            color: var(--text);
            border-radius: 4px;
            padding: 4px 7px;
            cursor: pointer;
            font: inherit;
            transition: border-color 140ms ease, background 140ms ease;
        }

        button:hover,
        .nav-button:hover {
            border-color: var(--accent);
        }

        .nav-button.active,
        .button-primary {
            background: linear-gradient(180deg, #c8dcf8, #8fb2e2);
            color: #fff;
            border-color: var(--accent);
        }

        .button-secondary {
            background: linear-gradient(180deg, #ffffff, #dbe3ef);
        }

        .main-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--surface);
            border-radius: 0;
        }

        .content-area {
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 6px;
            gap: 4px;
            background: linear-gradient(180deg, #dde5f0, #d2dbe8);
            overflow: hidden;
        }

        .tabs {
            display: flex;
            flex-wrap: nowrap;
            gap: 2px;
            padding: 0 1px;
            flex: 0 0 auto;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: thin;
            min-height: 28px;
            max-height: 28px;
            align-items: stretch;
        }

        .tab-button {
            flex: 0 0 auto;
            min-height: 26px;
            padding: 3px 8px;
            font-size: 0.7rem;
            line-height: 1;
        }

        .tab-button.active {
            background: linear-gradient(180deg, #f6f9fd, #e6edf6);
            color: var(--accent-ink);
            border-color: var(--line-strong);
            border-bottom-color: var(--surface);
        }

        .tab-content {
            flex: 1;
            min-height: 0;
            display: none;
            background: var(--surface);
            border: 1px solid var(--line-strong);
            border-radius: 4px;
            padding: 6px;
            overflow: auto;
        }

        .tab-content.active {
            display: block;
        }

        .query-layout {
            display: grid;
            grid-template-rows: minmax(150px, 1fr) minmax(128px, 1fr);
            gap: 4px;
            min-height: 0;
            height: 100%;
        }

        textarea,
        input {
            width: 100%;
            border: 1px solid var(--line-strong);
            border-radius: 4px;
            padding: 6px 7px;
            font: inherit;
            background: var(--surface-strong);
        }

        textarea {
            min-height: 96px;
            resize: vertical;
        }

        .section-label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.72rem;
            color: var(--muted);
        }

        .workspace-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            padding: 0 1px;
            flex: 0 0 auto;
        }

        .workspace-breadcrumbs {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            align-items: center;
            color: var(--accent-ink);
            font-size: 0.66rem;
        }

        .workspace-badge {
            display: inline-flex;
            align-items: center;
            min-height: 16px;
            padding: 0 5px;
            border: 1px solid var(--line);
            border-radius: 4px;
            background: var(--surface-strong);
        }

        .workspace-toolbar {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .workspace-shell {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            gap: 2px;
            padding: 1px;
            background: linear-gradient(180deg, #e8edf5, #d6deea);
            border: 1px solid var(--line-strong);
            border-radius: 4px;
            overflow: hidden;
        }

        .workspace-frame {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            gap: 4px;
            padding: 4px;
            background: var(--surface);
            border-top: 1px solid rgba(255,255,255,0.65);
            overflow: hidden;
        }

        .workspace-statusbar {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 3px 6px;
            border-top: 1px solid var(--line);
            background: linear-gradient(180deg, #e5ebf4, #d3dcea);
            color: var(--accent-ink);
            font-size: 0.66rem;
            flex: 0 0 auto;
        }

        .table-wrap {
            overflow: auto;
            border: 1px solid var(--line-strong);
            border-radius: 4px;
            background: var(--surface-strong);
            max-height: 30vh;
        }

        .result-grid td {
            user-select: none;
            cursor: default;
        }

        .result-grid td.is-selected {
            background: var(--accent-soft);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 6px 7px;
            border-bottom: 1px solid #d6deea;
            text-align: left;
            font-size: 0.74rem;
            vertical-align: top;
        }

        th {
            background: linear-gradient(180deg, #f5f8fc, #e2e9f3);
            position: sticky;
            top: 0;
        }

        .empty-state,
        .status-box {
            padding: 8px;
            border-radius: 4px;
            background: var(--surface-strong);
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: 0.68rem;
        }

        .status-box.error {
            color: var(--warning);
            border-color: rgba(163, 59, 32, 0.45);
            background: rgba(163, 59, 32, 0.05);
        }

        .status-box:empty {
            display: none;
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        .ddl-section {
            display: grid;
            gap: 10px;
            margin-bottom: 12px;
            padding: 10px;
            border: 1px solid var(--line-strong);
            border-radius: 4px;
            background: var(--surface-strong);
        }

        .ddl-section h4 {
            margin: 0;
            font-size: 0.84rem;
        }

        .ddl-subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 0.75rem;
        }

        .ddl-grid {
            display: grid;
            gap: 14px;
        }

        .ddl-grid pre {
            margin: 0;
            padding: 9px;
            border-radius: 4px;
            overflow: auto;
            background: #202a38;
            color: #e8effa;
            white-space: pre-wrap;
            font-size: 0.75rem;
        }

        .meta-table {
            overflow: auto;
            border: 1px solid var(--line-strong);
            border-radius: 4px;
            background: var(--surface-strong);
        }

        .meta-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .meta-table th,
        .meta-table td {
            padding: 6px 8px;
            border-bottom: 1px solid #d6deea;
            font-size: 0.74rem;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        @media (max-width: 960px) {
            html,
            body {
                overflow: auto;
            }

            .app-shell {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 100dvh;
                overflow: visible;
            }

            .activity-rail {
                border-top: 1px solid var(--line);
            }

            .rail-button {
                min-width: 0;
            }

            .query-layout {
                grid-template-rows: auto auto;
                min-height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-body">
                <div class="panel-stack">
                    <section class="panel panel-explorer active" data-panel="explorer">
                        <h3 class="panel-title">Data Explorer</h3>
                        <div class="path-chip" id="current-path">repository</div>
                        <div class="button-row">
                            <button class="button-secondary" id="go-parent">상위 폴더</button>
                            <button class="button-secondary" id="reload-tree">새로고침</button>
                        </div>
                        <div class="explorer-list" id="explorer-list"></div>
                        <div class="explorer-statusbar" id="explorer-statusbar">folders 0 | files 0 | size 0 B | disk 0%</div>
                    </section>

                    <section class="panel panel-chat" data-panel="chat">
                        <h3 class="panel-title">Chat</h3>
                        <div class="chat-panel">
                            <div id="chat-status" class="status-box"></div>
                            <div id="chat-response" class="chat-log"></div>
                            <div class="chat-composer">
                                <textarea id="chat-input" placeholder="질문을 입력하세요 (Ctrl+Enter 전송)"></textarea>
                                <button class="button-primary chat-send-mini" id="chat-send" title="전송">▶</button>
                            </div>
                        </div>
                    </section>

                    <section class="panel" data-panel="settings">
                        <h3 class="panel-title">Setting</h3>
                        <div class="form-grid">
                            <div>
                                <label class="section-label" for="llm-endpoint">LLM 서버 주소</label>
                                <input id="llm-endpoint" type="text" placeholder="http://localhost:11434/v1">
                            </div>
                            <div>
                                <label class="section-label" for="llm-token">토큰</label>
                                <input id="llm-token" type="password" placeholder="token">
                            </div>
                            <div>
                                <label class="section-label" for="llm-model">모델명</label>
                                <input id="llm-model" type="text" placeholder="gpt-4.1-mini">
                            </div>
                            <div class="button-row">
                                <button class="button-primary" id="save-settings">저장</button>
                                <button class="button-secondary" id="test-settings">연결 테스트</button>
                            </div>
                            <div class="status-box" id="settings-status">서버의 repository 설정 파일에 저장합니다.</div>
                        </div>
                    </section>
                </div>

                <div class="activity-rail">
                    <button class="rail-button active" data-target="explorer">
                        <span class="rail-label">Data Explorer</span>
                    </button>
                    <button class="rail-button" data-target="chat">
                        <span class="rail-label">Chat</span>
                    </button>
                    <button class="rail-button" data-target="settings">
                        <span class="rail-label">Setting</span>
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-panel">
            <section class="content-area">
                <div class="workspace-topbar">
                    <div class="workspace-breadcrumbs">
                        <span class="workspace-badge" id="workspace-root">repository</span>
                        <span class="workspace-badge" id="workspace-file">none</span>
                    </div>
                    <div class="workspace-toolbar">
                        <button class="button-secondary" id="workspace-reload">Reload</button>
                        <button class="button-secondary" id="workspace-focus-query">Query</button>
                    </div>
                </div>

                <div class="workspace-shell">
                    <div class="tabs" id="tabs"></div>

                    <div class="workspace-frame">
                        <section class="tab-content active" id="welcome-tab">
                            <div class="empty-state">
                                repository 폴더에서 샘플 SQLite를 바로 열 수 있게 구성해두었습니다. SQLite 파일을 선택한 뒤 View를 누르면 Query, DDL, 테이블 탭이 열립니다.
                            </div>
                        </section>
                    </div>

                    <div class="workspace-statusbar">
                        <span id="status-left">Ready</span>
                        <span id="status-right">Ctrl+C copy, F9 run</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const state = {
            currentPath: '',
            currentDatabase: null,
            activeTab: null,
            loadedTables: new Map(),
            tableTabIds: new Map(),
        };

        const explorerList = document.getElementById('explorer-list');
        const panelStack = document.querySelector('.panel-stack');
        const explorerStatusbar = document.getElementById('explorer-statusbar');
        const currentPath = document.getElementById('current-path');
        const tabs = document.getElementById('tabs');
        const contentArea = document.querySelector('.content-area');
        const welcomeTab = document.getElementById('welcome-tab');
        const chatStatus = document.getElementById('chat-status');
        const chatResponse = document.getElementById('chat-response');
        const workspaceRoot = document.getElementById('workspace-root');
        const workspaceFile = document.getElementById('workspace-file');
        const statusLeft = document.getElementById('status-left');
        const statusRight = document.getElementById('status-right');
        const workspaceReload = document.getElementById('workspace-reload');
        const workspaceFocusQuery = document.getElementById('workspace-focus-query');

        const railButtons = Array.from(document.querySelectorAll('.rail-button'));
        let selectedExplorerPath = '';

        function setStatus(leftText, rightText) {
            if (leftText !== undefined) {
                statusLeft.textContent = leftText;
            }
            if (rightText !== undefined) {
                statusRight.textContent = rightText;
            }
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        async function requestJson(url, options = {}) {
            const response = await fetch(url, { cache: 'no-store', ...options });
            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(data.error || '요청 처리 중 오류가 발생했습니다.');
            }
            return data;
        }

        function setPanel(target) {
            document.querySelectorAll('.panel').forEach((panel) => {
                panel.classList.toggle('active', panel.dataset.panel === target);
            });
            railButtons.forEach((button) => {
                button.classList.toggle('active', button.dataset.target === target);
            });
            panelStack.scrollTop = 0;
            setStatus(`Panel: ${target}`, 'Ctrl+C copy, F9 run');
        }

        function renderExplorer(treeData) {
            const entries = Array.isArray(treeData.entries) ? treeData.entries : [];
            const head = `
                <div class="explorer-head">
                    <div>Name</div>
                    <div style="text-align: right;">Size</div>
                    <div style="text-align: right;">Modified</div>
                </div>
            `;

            const allEntries = [];
            if (treeData.current_path) {
                allEntries.push({
                    name: '../',
                    path: treeData.parent_path || '',
                    type: 'parent',
                    is_sqlite: false,
                    size_human: '',
                    modified_at: '',
                });
            }
            allEntries.push(...entries);

            const rows = allEntries.map((entry) => {
                const kind = entry.type === 'parent' ? '[UP]' : entry.type === 'directory' ? '[DIR]' : (entry.is_sqlite ? '[DB]' : '[FILE]');
                const sizeText = entry.type === 'file' ? (entry.size_human || '0 B') : '';
                const selectedClass = selectedExplorerPath && selectedExplorerPath === entry.path ? ' selected' : '';
                const parentClass = entry.type === 'parent' ? ' parent-row' : '';
                return `
                    <div class="explorer-row${selectedClass}${parentClass}" data-path="${escapeHtml(entry.path)}" data-type="${escapeHtml(entry.type)}" data-is-sqlite="${entry.is_sqlite ? '1' : '0'}">
                        <div class="explorer-name-col">
                            <span class="explorer-kind">${kind}</span>
                            <span class="explorer-name">${escapeHtml(entry.name)}</span>
                        </div>
                        <div class="explorer-size">${escapeHtml(sizeText)}</div>
                        <div class="explorer-modified">${escapeHtml(entry.modified_at || '')}</div>
                    </div>
                `;
            }).join('');

            explorerList.innerHTML = head + rows;
        }

        async function loadTree(path = '') {
            try {
                const data = await requestJson(`/api/tree/?path=${encodeURIComponent(path)}`);
                state.currentPath = data.current_path;
                currentPath.textContent = `repository${data.current_path ? `/${data.current_path}` : ''}`;
                workspaceRoot.textContent = currentPath.textContent;
                setStatus(`Browsing: ${currentPath.textContent}`, 'Select a SQLite file to open it');
                const parentButton = document.getElementById('go-parent');
                parentButton.dataset.parentPath = data.parent_path;
                parentButton.disabled = !data.parent_path;

                const stats = data.stats || {};
                const disk = stats.disk || {};
                explorerStatusbar.textContent = [
                    `folders ${Number(stats.directories || 0)}`,
                    `files ${Number(stats.files || 0)}`,
                    `size ${stats.total_size_human || '0 B'}`,
                    `disk ${Number(disk.used_percent || 0).toFixed(1)}%`,
                ].join(' | ');

                explorerList.innerHTML = '';
                if (!data.entries.length) {
                    explorerList.innerHTML = '<div class="empty-state">폴더가 비어 있습니다.</div>';
                    return;
                }
                renderExplorer(data);
            } catch (error) {
                explorerList.innerHTML = `<div class="status-box error">${escapeHtml(error.message)}</div>`;
                explorerStatusbar.textContent = 'folders 0 | files 0 | size 0 B | disk 0%';
            }
        }

        function renderTable(columns, rows) {
            if (!columns.length) {
                return '<div class="empty-state">결과 컬럼이 없습니다.</div>';
            }

            const head = columns.map((column) => `<th>${escapeHtml(column)}</th>`).join('');
            const body = rows.length
                ? rows.map((row, rowIndex) => `
                    <tr>${columns.map((column, columnIndex) => `<td data-row="${rowIndex}" data-col="${columnIndex}">${escapeHtml(row[column] ?? '')}</td>`).join('')}</tr>
                `).join('')
                : `<tr><td colspan="${columns.length}">조회 결과가 없습니다.</td></tr>`;

            return `
                <div class="table-wrap">
                    <table class="result-grid">
                        <thead><tr>${head}</tr></thead>
                        <tbody>${body}</tbody>
                    </table>
                </div>
            `;
        }

        function renderMetaTable(headers, rows) {
            if (!rows.length) {
                return '<div class="empty-state">정보가 없습니다.</div>';
            }

            const head = headers.map((header) => `<th>${escapeHtml(header.label)}</th>`).join('');
            const body = rows.map((row) => `
                <tr>${headers.map((header) => `<td>${escapeHtml(row[header.key] ?? '')}</td>`).join('')}</tr>
            `).join('');

            return `
                <div class="meta-table">
                    <table>
                        <thead><tr>${head}</tr></thead>
                        <tbody>${body}</tbody>
                    </table>
                </div>
            `;
        }

        function renderDdlContent(tables) {
            if (!tables.length) {
                return '<div class="empty-state">DDL 정보를 표시할 테이블이 없습니다.</div>';
            }

            return `
                <div class="ddl-grid">
                    ${tables.map((table) => `
                        <section class="ddl-section">
                            <div>
                                <h4>${escapeHtml(table.name)}</h4>
                                <p class="ddl-subtitle">컬럼 정의와 인덱스, 원본 CREATE SQL을 확인할 수 있습니다.</p>
                            </div>
                            <pre>${escapeHtml(table.create_sql || 'CREATE SQL 정보가 없습니다.')}</pre>
                            <div>
                                <strong>Columns</strong>
                                ${renderMetaTable([
                                    { key: 'cid', label: 'cid' },
                                    { key: 'name', label: 'name' },
                                    { key: 'type', label: 'type' },
                                    { key: 'notnull', label: 'notnull' },
                                    { key: 'dflt_value', label: 'default' },
                                    { key: 'pk', label: 'pk' },
                                ], table.columns || [])}
                            </div>
                            <div>
                                <strong>Indexes</strong>
                                ${table.indexes && table.indexes.length ? renderMetaTable([
                                    { key: 'name', label: 'name' },
                                    { key: 'unique', label: 'unique' },
                                    { key: 'origin', label: 'origin' },
                                    { key: 'partial', label: 'partial' },
                                    { key: 'columns', label: 'columns' },
                                    { key: 'sql', label: 'sql' },
                                ], table.indexes.map((indexItem) => ({
                                    ...indexItem,
                                    unique: indexItem.unique ? 'true' : 'false',
                                    partial: indexItem.partial ? 'true' : 'false',
                                    columns: Array.isArray(indexItem.columns) ? indexItem.columns.join(', ') : indexItem.columns,
                                }))) : '<div class="empty-state">인덱스가 없습니다.</div>'}
                            </div>
                        </section>
                    `).join('')}
                </div>
            `;
        }

        function renderChatResponse(data) {
            const parts = [];
            parts.push(`<div class="status-box"><strong>Answer</strong><div style="margin-top: 8px; white-space: pre-wrap;">${escapeHtml(data.answer || '')}</div></div>`);

            if (data.suggested_sql) {
                parts.push(`<div class="status-box" style="margin-top: 12px;"><strong>SQL</strong><pre style="margin: 8px 0 0; white-space: pre-wrap;">${escapeHtml(data.suggested_sql)}</pre></div>`);
            }

            if (data.query_result) {
                if (data.query_result.error) {
                    parts.push(`<div class="status-box error" style="margin-top: 12px;">${escapeHtml(data.query_result.error)}</div>`);
                } else {
                    parts.push(`<div style="margin-top: 12px;">${renderTable(data.query_result.columns || [], data.query_result.rows || [])}</div>`);
                }
            }

            return parts.join('');
        }

        function attachGridInteractions(container) {
            const table = container.querySelector('.result-grid');
            if (!table) {
                return;
            }

            table.addEventListener('click', (event) => {
                const cell = event.target.closest('td');
                if (!cell) {
                    return;
                }

                if (event.ctrlKey || event.metaKey) {
                    cell.classList.toggle('is-selected');
                    return;
                }

                table.querySelectorAll('td.is-selected').forEach((selectedCell) => {
                    selectedCell.classList.remove('is-selected');
                });
                cell.classList.add('is-selected');
            });
        }

        function copySelectedCells() {
            const selectedCells = Array.from(document.querySelectorAll('.result-grid td.is-selected'));
            if (!selectedCells.length) {
                return false;
            }

            const groupedRows = new Map();
            selectedCells
                .sort((left, right) => Number(left.dataset.row) - Number(right.dataset.row) || Number(left.dataset.col) - Number(right.dataset.col))
                .forEach((cell) => {
                    const rowIndex = Number(cell.dataset.row);
                    if (!groupedRows.has(rowIndex)) {
                        groupedRows.set(rowIndex, []);
                    }
                    groupedRows.get(rowIndex).push(cell.textContent);
                });

            const clipboardText = Array.from(groupedRows.values()).map((row) => row.join('\t')).join('\n');

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(clipboardText).catch(() => {
                    const textarea = document.createElement('textarea');
                    textarea.value = clipboardText;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    textarea.remove();
                });
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = clipboardText;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                textarea.remove();
            }

            return true;
        }

        function ensureTab(id, title, contentHtml) {
            let tabButton = document.querySelector(`[data-tab="${id}"]`);
            let tabContent = document.getElementById(`tab-${id}`);

            if (!tabButton) {
                tabButton = document.createElement('button');
                tabButton.className = 'tab-button';
                tabButton.dataset.tab = id;
                tabButton.textContent = title;
                tabButton.addEventListener('click', () => activateTab(id));
                tabs.appendChild(tabButton);
            }

            if (!tabContent) {
                tabContent = document.createElement('section');
                tabContent.id = `tab-${id}`;
                tabContent.className = 'tab-content';
                contentArea.appendChild(tabContent);
            }

            if (contentHtml !== undefined) {
                tabContent.innerHTML = contentHtml;
            }
        }

        function activateTab(id) {
            state.activeTab = id;
            welcomeTab.classList.remove('active');

            document.querySelectorAll('.tab-button').forEach((button) => {
                button.classList.toggle('active', button.dataset.tab === id);
            });
            document.querySelectorAll('.tab-content').forEach((content) => {
                content.classList.toggle('active', content.id === `tab-${id}`);
            });
        }

        async function openDatabase(path) {
            try {
                const data = await requestJson(`/api/database/?path=${encodeURIComponent(path)}`);
                state.currentDatabase = data.database;
                state.loadedTables.clear();
                state.tableTabIds.clear();

                workspaceFile.textContent = data.database.name;
                setStatus(`Opened: ${data.database.name}`, `Tables: ${data.database.tables.length}`);
                tabs.innerHTML = '';
                document.querySelectorAll('.tab-content').forEach((content) => {
                    if (content !== welcomeTab) {
                        content.remove();
                    }
                });

                ensureTab(
                    'query',
                    'Query',
                    `
                        <div class="query-layout">
                            <div>
                                <label class="section-label" for="sql-editor">SQL</label>
                                <textarea id="sql-editor">SELECT name FROM sqlite_master WHERE type = 'table';</textarea>
                                <div class="button-row" style="margin-top: 12px;">
                                    <button class="button-primary" id="run-query-button">실행</button>
                                </div>
                            </div>
                            <div>
                                <label class="section-label">결과</label>
                                <div id="query-result" class="status-box">실행 결과가 여기 표시됩니다.</div>
                            </div>
                        </div>
                    `
                );

                ensureTab(
                    'ddl',
                    'DDL',
                    renderDdlContent(data.database.tables)
                );

                data.database.tables.forEach((table, index) => {
                    const tabId = `table-${index}`;
                    state.tableTabIds.set(table.name, tabId);

                    ensureTab(
                        tabId,
                        table.name,
                        `
                            <div class="status-box">${table.columns.length ? `컬럼: ${escapeHtml(table.columns.map((column) => column.name).join(', '))}` : '컬럼 정보 없음'}</div>
                            <div id="table-result-${tabId}" class="status-box" style="margin-top: 12px;">테이블을 열면 결과를 불러옵니다.</div>
                        `
                    );

                    const button = document.querySelector(`[data-tab="${tabId}"]`);
                    button.addEventListener('click', () => {
                        activateTab(tabId);
                        loadTable(table.name, tabId);
                    });
                });

                document.getElementById('run-query-button').addEventListener('click', runQuery);
                document.getElementById('test-settings').addEventListener('click', testSettingsConnection);

                activateTab('query');
            } catch (error) {
                setStatus('Open database failed', error.message);
            }
        }

        async function loadTable(tableName, tabId = state.tableTabIds.get(tableName)) {
            if (!state.currentDatabase || !tabId || state.loadedTables.has(tableName)) {
                return;
            }

            const target = document.getElementById(`table-result-${tabId}`);
            if (!target) {
                return;
            }

            target.className = 'status-box';
            target.textContent = '로딩 중...';

            try {
                const data = await requestJson(`/api/table/?path=${encodeURIComponent(state.currentDatabase.path)}&table=${encodeURIComponent(tableName)}&limit=50`);
                target.className = '';
                target.innerHTML = renderTable(data.columns, data.rows);
                attachGridInteractions(target);
                state.loadedTables.set(tableName, true);
            } catch (error) {
                target.className = 'status-box error';
                target.textContent = error.message;
            }
        }

        async function runQuery() {
            if (!state.currentDatabase) {
                return;
            }

            const target = document.getElementById('query-result');
            const sql = document.getElementById('sql-editor').value;
            setStatus('Running query…', state.currentDatabase.name);
            target.className = 'status-box';
            target.textContent = '실행 중...';

            try {
                const data = await requestJson('/api/query/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: state.currentDatabase.path, sql }),
                });
                target.className = '';
                target.innerHTML = renderTable(data.columns, data.rows);
                attachGridInteractions(target);
                setStatus(`Rows: ${data.row_count}`, data.truncated ? 'Truncated' : state.currentDatabase.name);
            } catch (error) {
                target.className = 'status-box error';
                target.textContent = error.message;
                setStatus('Query failed', error.message);
            }
        }

        async function loadSettings() {
            try {
                const data = await requestJson('/api/settings/');
                document.getElementById('llm-endpoint').value = data.settings.endpoint || '';
                document.getElementById('llm-token').value = data.settings.token || '';
                document.getElementById('llm-model').value = data.settings.model || '';
                document.getElementById('settings-status').textContent = '서버 설정을 불러왔습니다.';
            } catch (error) {
                document.getElementById('settings-status').textContent = error.message;
            }
        }

        async function testSettingsConnection() {
            const status = document.getElementById('settings-status');
            status.className = 'status-box';
            status.textContent = '연결을 테스트하는 중...';

            try {
                const payload = {
                    endpoint: document.getElementById('llm-endpoint').value,
                    token: document.getElementById('llm-token').value,
                    model: document.getElementById('llm-model').value,
                };
                const data = await requestJson('/api/settings/test/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                status.textContent = `연결 성공: ${data.provider}`;
            } catch (error) {
                status.className = 'status-box error';
                status.textContent = error.message;
            }
        }

        document.querySelectorAll('.nav-button').forEach((button) => {
            button.addEventListener('click', () => setPanel(button.dataset.target));
        });

        document.getElementById('go-parent').addEventListener('click', (event) => {
            loadTree(event.currentTarget.dataset.parentPath || '');
        });

        document.getElementById('reload-tree').addEventListener('click', () => loadTree(state.currentPath));

        explorerList.addEventListener('click', (event) => {
            const row = event.target.closest('.explorer-row');
            if (!row) {
                return;
            }
            selectedExplorerPath = row.dataset.path || '';
            explorerList.querySelectorAll('.explorer-row').forEach((item) => item.classList.remove('selected'));
            row.classList.add('selected');
        });

        explorerList.addEventListener('dblclick', (event) => {
            const row = event.target.closest('.explorer-row');
            if (!row) {
                return;
            }

            const targetPath = row.dataset.path || '';
            if (row.dataset.type === 'parent' || row.dataset.type === 'directory') {
                loadTree(targetPath);
                return;
            }
            if (row.dataset.isSqlite === '1') {
                openDatabase(targetPath);
            }
        });

        document.getElementById('save-settings').addEventListener('click', async () => {
            const status = document.getElementById('settings-status');
            status.className = 'status-box';
            status.textContent = '저장 중...';

            try {
                await requestJson('/api/settings/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        endpoint: document.getElementById('llm-endpoint').value,
                        token: document.getElementById('llm-token').value,
                        model: document.getElementById('llm-model').value,
                    }),
                });
                status.textContent = '서버에 설정을 저장했습니다.';
            } catch (error) {
                status.className = 'status-box error';
                status.textContent = error.message;
            }
        });

        async function sendChatMessage() {
            const chatInput = document.getElementById('chat-input');
            const message = chatInput.value.trim();
            chatStatus.className = 'status-box';
            chatStatus.textContent = '질의 중...';
            chatResponse.innerHTML = '';

            if (!message) {
                chatStatus.className = 'status-box error';
                chatStatus.textContent = '질문을 입력해주세요.';
                return;
            }

            if (!state.currentDatabase) {
                chatStatus.className = 'status-box error';
                chatStatus.textContent = '먼저 SQLite 파일을 선택하세요.';
                return;
            }

            try {
                const data = await requestJson('/api/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        path: state.currentDatabase.path,
                        message,
                    }),
                });

                chatStatus.textContent = `응답 수신: ${data.database.name}`;
                chatResponse.innerHTML = renderChatResponse(data);
                if (data.query_result && !data.query_result.error) {
                    attachGridInteractions(chatResponse);
                }
                chatInput.value = '';
                setStatus('Chat completed', data.suggested_sql ? 'SQL suggested' : data.database.name);
            } catch (error) {
                chatStatus.className = 'status-box error';
                chatStatus.textContent = error.message;
                setStatus('Chat failed', error.message);
            }
        }

        document.getElementById('chat-send').addEventListener('click', sendChatMessage);
        document.getElementById('chat-input').addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && (event.ctrlKey || event.metaKey)) {
                event.preventDefault();
                sendChatMessage();
            }
        });

        railButtons.forEach((button) => {
            button.addEventListener('click', () => setPanel(button.dataset.target));
        });

        workspaceReload.addEventListener('click', () => loadTree(state.currentPath));
        workspaceFocusQuery.addEventListener('click', () => {
            activateTab('query');
            const editor = document.getElementById('sql-editor');
            if (editor) {
                editor.focus();
            }
        });

        document.addEventListener('keydown', (event) => {
            if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'c' && copySelectedCells()) {
                event.preventDefault();
                return;
            }

            if (event.key === 'F9' && document.activeElement && document.activeElement.id === 'sql-editor') {
                event.preventDefault();
                runQuery();
            }
        });

        loadSettings();
        loadTree();
    </script>
</body>
</html>
