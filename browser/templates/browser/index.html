{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>websqlitebrowser</title>
    <script>
        (function () {
            // Edge 구버전 호환: replaceAll 미지원 환경 폴리필
            if (!String.prototype.replaceAll) {
                // eslint-disable-next-line no-extend-native
                String.prototype.replaceAll = function (search, replacement) {
                    const source = String(this);
                    if (search instanceof RegExp) {
                        if (!search.global) {
                            throw new TypeError('replaceAll regex must have global flag');
                        }
                        return source.replace(search, replacement);
                    }
                    return source.split(String(search)).join(String(replacement));
                };
            }

            const userAgent = navigator.userAgent || '';
            const isMobile = /Android|iPhone|iPad|iPod|Mobile|webOS|BlackBerry|IEMobile|Opera Mini/i.test(userAgent)
                || (window.matchMedia && window.matchMedia('(pointer: coarse)').matches && window.innerWidth < 900);
            document.documentElement.dataset.device = isMobile ? 'mobile' : 'desktop';
            document.documentElement.style.setProperty('--ui-scale', isMobile ? '1' : '1.2');
            
            // Windows 감지
            const isWindows = /Windows|Win32|Win64|WinCE/i.test(userAgent);
            if (isWindows) {
                document.documentElement.dataset.os = 'windows';
            }
            document.documentElement.style.setProperty('--explorer-scale', (!isMobile && isWindows) ? '1.5' : '1');
        }());
    </script>
    <link rel="stylesheet" href="{% static 'browser/app.css' %}?v=20260527-1">
</head>
<body>
    <script>
        window.APP_VERSION = '{{ app_version|escapejs }}';
    </script>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-body">
                <div class="panel-stack">
                    <section class="panel panel-explorer active" data-panel="explorer">
                        <h3 class="panel-title">Data Explorer</h3>
                        <div class="explorer-topline">
                            <div class="path-chip" id="workspace-root">repository</div>
                            <button class="button-secondary" id="workspace-reload">Reload</button>
                        </div>
                        <input id="explorer-filter" type="text" placeholder="Filter (이름 포함 검색)">
                        <div class="explorer-list" id="explorer-list" tabindex="0" aria-label="Data Explorer list"></div>
                        <div class="explorer-statusbar" id="explorer-statusbar">folders 0 | files 0 | size 0 B | disk 0%</div>
                    </section>

                    <section class="panel panel-chat" data-panel="chat">
                        <h3 class="panel-title">Chat</h3>
                        <div class="chat-panel">
                            <div id="chat-response" class="chat-log"></div>
                            <div class="chat-composer">
                                <div class="chat-input-wrap">
                                    <svg class="chat-input-orbit" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true" focusable="false">
                                        <rect x="1" y="1" width="98" height="98" rx="3" ry="3"></rect>
                                    </svg>
                                    <textarea id="chat-input" placeholder="질문을 입력하세요 (Ctrl+Enter 전송)"></textarea>
                                </div>
                                <button class="button-primary chat-send-mini" id="chat-send" title="전송">▶</button>
                            </div>
                        </div>
                    </section>

                    <section class="panel" data-panel="settings">
                        <h3 class="panel-title">Setting</h3>
                        <div class="form-grid">
                            <div>
                                <label class="section-label" for="request-url">Request URL</label>
                                <input id="request-url" type="text" placeholder="http://intranet-llm.local:8000/v1/chat/completions">
                            </div>
                            <div>
                                <label class="section-label" for="request-timeout">Timeout (seconds)</label>
                                <input id="request-timeout" type="number" min="1" step="1" placeholder="30">
                            </div>
                            <div>
                                <label class="section-label" for="request-headers">Headers (JSON)</label>
                                <textarea id="request-headers" placeholder='{
  "Content-Type": "application/json",
  "Authorization": "Bearer sk-your-private-token"
}' rows="5"></textarea>
                            </div>
                            <div>
                                <label class="section-label" for="request-json">JSON Body (JSON)</label>
                                <textarea id="request-json" placeholder='{
  "model": "gpt-4.1-mini",
  "messages": [
    {"role": "system", "content": "{{system_prompt}}"},
    {"role": "user", "content": "{{user_prompt}}"}
  ]
}' rows="6"></textarea>
                            </div>
                            <div class="button-row">
                                <button class="button-secondary" id="fill-template-openai">OpenAI 예시</button>
                                <button class="button-secondary" id="fill-template-custom">커스텀 예시</button>
                            </div>
                            <div class="button-row">
                                <button class="button-primary" id="save-settings">저장</button>
                                <button class="button-secondary" id="test-settings">연결 테스트</button>
                            </div>
                            <div class="status-box" id="settings-status"></div>
                        </div>
                    </section>
                </div>

                <div class="activity-rail">
                    <button class="rail-button active" data-target="explorer">
                        <span class="rail-label">Data Explorer</span>
                    </button>
                    <button class="rail-button" data-target="chat">
                        <span class="rail-label">Chat</span>
                    </button>
                    <button class="rail-button" data-target="settings">
                        <span class="rail-label">Setting</span>
                    </button>
                </div>
            </div>
        </aside>

        <div class="sidebar-resizer" id="sidebar-resizer" role="separator" aria-orientation="vertical" title="드래그해서 좌우 크기 조정"></div>

        <main class="main-panel">
            <section class="content-area">
                <div class="workspace-topbar">
                    <div class="workspace-breadcrumbs">
                        <span class="workspace-badge" id="workspace-file">none</span>
                    </div>
                </div>

                <div class="workspace-shell">
                    <div class="tabs" id="tabs"></div>

                    <div class="workspace-frame">
                        <section class="tab-content active" id="welcome-tab">
                            <div class="empty-state"></div>
                        </section>
                    </div>
                </div>
            </section>

            <div class="output-resizer" id="output-resizer" role="separator" aria-orientation="horizontal" title="드래그해서 Output 높이 조정"></div>

            <div class="workspace-output">
                <div class="output-toolbar">
                    <span>Output</span>
                    <div class="output-actions">
                        <button class="output-icon-btn" id="output-clear" title="Clear">✕</button>
                        <button class="output-icon-btn" id="output-autohide" aria-pressed="false" title="Auto Hide">▼</button>
                    </div>
                </div>
                <div class="output-body" id="output-body"></div>
            </div>
        </main>
    </div>

    <script src="{% static 'browser/app.state.js' %}?v=20260517-2"></script>    <script src="{% static 'browser/app.cache.js' %}?v=20260521-2"></script>    <script src="{% static 'browser/app.pagination.js' %}?v=20260516-1"></script>    <script src="{% static 'browser/app.metrics.js' %}?v=20260516-1"></script>    <script src="{% static 'browser/app.dom.js' %}?v=20260516-1"></script>
    <script src="{% static 'browser/app.utils.js' %}?v=20260516-1"></script>
    <script src="{% static 'browser/app.api.js' %}?v=20260517-2"></script>
    <script src="{% static 'browser/app.sql.js' %}?v=20260516-1"></script>
    <script src="{% static 'browser/app.grid.js' %}?v=20260519-1"></script>
    <script src="{% static 'browser/app.grid.selection.js' %}?v=20260516-1"></script>
    <script src="{% static 'browser/app.tabs.js' %}?v=20260516-1"></script>
    <script src="{% static 'browser/app.table.view.js' %}?v=20260516-1"></script>
    <script src="{% static 'browser/app.table.controller.js' %}?v=20260521-2"></script>
    <script src="{% static 'browser/app.db.view.js' %}?v=20260521-1"></script>
    <script src="{% static 'browser/app.db.js' %}?v=20260521-1"></script>
    <script src="{% static 'browser/app.query.controller.js' %}?v=20260516-1"></script>
    <script src="{% static 'browser/app.query.view.js' %}?v=20260516-1"></script>
    <script src="{% static 'browser/app.query.js' %}?v=20260521-3"></script>
    <script src="{% static 'browser/app.panel.js' %}?v=20260516-1"></script>
    <script src="{% static 'browser/app.explorer.js' %}?v=20260526-1"></script>
    <script src="{% static 'browser/app.grid-interactions.js' %}?v=20260516-1"></script>
    <script src="{% static 'browser/app.settings.js' %}?v=20260521-7"></script>
    <script src="{% static 'browser/app.chat.js' %}?v=20260517-16"></script>
    <script src="{% static 'browser/app.output.js' %}?v=20260516-1"></script>
    <script src="{% static 'browser/app.layout.js' %}?v=20260517-2"></script>
    <script src="{% static 'browser/app.shortcuts.js' %}?v=20260516-1"></script>
    <script src="{% static 'browser/app.events.js' %}?v=20260520-2"></script>
</body>
</html>
